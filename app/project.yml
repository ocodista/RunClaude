name: RunClaude
options:
  bundleIdPrefix: com.caioborghi
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    PRODUCT_NAME: RunClaude
targets:
  RunClaude:
    type: application
    platform: macOS
    sources:
      - RunClaude
    info:
      path: RunClaude/Info.plist
      properties:
        LSUIElement: true
    entitlements:
      path: RunClaude/RunClaude.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.network.client: true
