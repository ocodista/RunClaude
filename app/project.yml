name: ClaudeEyes
options:
  bundleIdPrefix: com.caioborghi
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    PRODUCT_NAME: Claude Eyes
targets:
  ClaudeEyes:
    type: application
    platform: macOS
    sources:
      - ClaudeEyes
    info:
      path: ClaudeEyes/Info.plist
      properties:
        LSUIElement: true
    entitlements:
      path: ClaudeEyes/ClaudeEyes.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.network.client: true
